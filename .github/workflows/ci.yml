name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build react-veil
        run: npm run build:lib

      - name: Run linter
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-check:
    name: Build verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Build react-veil
        run: npm run build:lib

      - name: Build docs app
        run: npm run build:docs

      - name: Verify package can be packed
        working-directory: react-veil
        run: npm pack

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [test, build-check]
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          for result in "${{ needs.test.result }}" "${{ needs.build-check.result }}"; do
            if [ "$result" != "success" ]; then
              echo "CI did not pass."
              exit 1
            fi
          done
