name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  auto-release:
    name: Auto-release on dependency update
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'dependabot')

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.x

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          cd react-veil
          npm version patch --no-git-tag-version > /dev/null
          NEW_VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          cd ..
          npm version patch --no-git-tag-version > /dev/null

      - name: Update lockfile
        run: npm install --package-lock-only

      - name: Commit and tag version bump
        run: |
          git add package.json package-lock.json react-veil/package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.bump.outputs.version }}" \
            --title "${{ steps.bump.outputs.version }}" \
            --notes "Automated release for dependency updates." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
